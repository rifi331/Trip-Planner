# Build and push the Docker image to GitHub Container Registry (ghcr.io)
# on every push to main. Uses the built-in GITHUB_TOKEN, so no extra secrets
# or PAT setup are required. Image is published as public.
name: Build and Push Docker Image

on:
  push:
    branches: [main]
  # Allow manual triggering from the Actions tab.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository = "<owner>/<repo>" -> lowercased for ghcr.io naming.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # The id-token write permission is not needed; packages:write is what
    # allows pushing to ghcr.io using the automatic GITHUB_TOKEN.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag with the short commit SHA AND a date-prefixed tag so each
          # build is uniquely identifiable and pin-able in compose files.
          # We deliberately avoid `latest` so installs never accidentally
          # pull a stale cached image.
          tags: |
            type=sha,prefix=,format=short
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
