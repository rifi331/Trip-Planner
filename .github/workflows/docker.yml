# Build and push the Docker image to GitHub Container Registry (ghcr.io).
#
# Two trigger paths:
#  - Push to main  -> builds an intermediate "edge" image (for quick testing).
#  - Push a tag v*  -> builds a RELEASE image tagged with the semantic version.
#    Use tags like v0.1.0, v0.1.1, v0.2.0 following SemVer.
#
# Versioning convention:
#  - 0.1.0 -> 0.1.1  : bug fixes / patches
#  - 0.1.x -> 0.2.0  : new features
#  - 0.x.y -> 1.0.0  : major / breaking change
#
# To release a new version locally:
#   git tag v0.1.1
#   git push origin v0.1.1
name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action derives the right tags automatically:
      #  - on a `v0.1.2` tag      -> 0.1.2, 0.1, 0 (SemVer variants)
      #  - on a push to main      -> edge (intermediate, not for prod)
      #  We deliberately NEVER publish a `latest` tag so TrueNAS installs that
      #  pin a version never silently pull a different image.
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
