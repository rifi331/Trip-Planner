services:
  travel-planner:
    container_name: travel-planner
    environment:
      DATABASE_URL: postgres://secret@192.168.100.126:5432/travel_planner?sslmode=disable
      OPENAI_API_KEY: secret
      OPENAI_MODEL: gpt-4o-mini
      PORT: '30001'
      NODE_ENV: production
    # Pin to a specific semantic version tag (NOT :latest, which TrueNAS/Docker
    # often caches and pulls a stale image). To upgrade, change this to the new
    # version, e.g. 0.1.1 (bugfix) or 0.2.0 (new feature).
    # See available versions: https://github.com/rifi331/Trip-Planner/pkgs/container/trip-planner/versions
    image: ghcr.io/rifi331/trip-planner:0.1.0
    ports:
      - '30001:30001'
    restart: unless-stopped
